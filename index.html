<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PresentToU — 대화 기반 선물 TOP 3 추천</title>
  <style>
    :root {
      --bg: #0f1020;
      --card: #1a1c33;
      --accent: #ff7a9c;
      --accent2: #7c8cff;
      --danger: #ff5566;
      --text: #f2f3fb;
      --muted: #a7abc7;
      --line: #2b2e4a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(1200px 600px at 70% -10%, #23264a 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 48px 20px 80px; }

    header { text-align: center; margin-bottom: 40px; }
    .logo {
      display: inline-flex; align-items: center; gap: 8px;
      font-weight: 800; font-size: 28px; letter-spacing: -0.5px;
    }
    .logo .gift { font-size: 30px; }
    .grad { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    header p { color: var(--muted); margin-top: 10px; font-size: 15px; }

    .panel {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 18px; padding: 28px; margin-bottom: 28px;
    }
    .panel h2 { font-size: 17px; margin-bottom: 6px; }
    .panel .hint { color: var(--muted); font-size: 13px; margin-bottom: 18px; }

    .uploads { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    @media (max-width: 720px){ .uploads { grid-template-columns: 1fr; } }
    .drop {
      border: 1.5px dashed var(--line); border-radius: 14px; padding: 22px 16px;
      text-align: center; cursor: pointer; transition: .18s; background: #15172b;
    }
    .drop:hover { border-color: var(--accent2); background: #181b34; }
    .drop.filled { border-color: var(--accent); border-style: solid; }
    .drop .ico { font-size: 26px; }
    .drop .label { font-weight: 600; margin-top: 8px; font-size: 14px; }
    .drop .sub { color: var(--muted); font-size: 12px; margin-top: 4px; word-break: break-all; }
    .drop input { display: none; }
    .drop input[type="text"], .drop input[type="number"] {
      display: block; width: 100%; padding: 8px; border: 1px solid var(--line);
      border-radius: 8px; background: #0f1020; color: var(--text); text-align: center;
    }
    .budget-range { text-align: left; }
    .budget-track { position: relative; height: 24px; margin-top: 8px; }
    .budget-track::before {
      content: ""; position: absolute; top: 10px; left: 0; right: 0; height: 4px;
      border-radius: 4px; background: var(--line);
    }
    .drop input[type="range"] {
      position: absolute; inset: 0; display: block; width: 100%; margin: 0;
      appearance: none; background: transparent; pointer-events: none;
    }
    .drop input[type="range"]::-webkit-slider-runnable-track { background: transparent; }
    .drop input[type="range"]::-moz-range-track { background: transparent; }
    .drop input[type="range"]::-webkit-slider-thumb {
      appearance: none; width: 18px; height: 18px; margin-top: -7px; border: 0;
      border-radius: 50%; background: var(--accent); pointer-events: auto; cursor: pointer;
    }
    .drop input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px; border: 0; border-radius: 50%; background: var(--accent);
      pointer-events: auto; cursor: pointer;
    }

    .cta {
      display: block; width: 100%; margin-top: 22px; padding: 16px;
      border: none; border-radius: 14px; cursor: pointer;
      font-size: 16px; font-weight: 700; color: #fff;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: transform .1s, opacity .2s;
    }
    .cta:hover { transform: translateY(-1px); }
    .cta:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .status { text-align: center; color: var(--muted); font-size: 14px; margin: 8px 0 0; min-height: 20px; }
    .status.err { color: var(--danger); }
    .timer { color: var(--accent2); font-weight: 700; }

    /* 결과 */
    .results { display: none; }
    .results.show { display: block; }
    .results h2 { text-align: center; font-size: 20px; margin-bottom: 6px; }
    .results .sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .ingest { text-align: center; color: var(--accent2); font-size: 12px; margin: -16px 0 22px; min-height: 16px; }

    .analysis { background: linear-gradient(160deg,#1c1f3a,#171930); border: 1px solid var(--line); border-radius: 16px; padding: 20px 22px; margin-bottom: 26px; }
    .analysis .tag { font-size: 12px; color: var(--accent2); font-weight: 700; letter-spacing: .04em; }
    .analysis p { margin-top: 6px; font-size: 15px; }

    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    @media (max-width: 720px){ .cards { grid-template-columns: 1fr; } }

    .card { perspective: 1200px; height: 340px; }
    .card-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform .6s; transform-style: preserve-3d;
    }
    .card:hover .card-inner, .card:focus-within .card-inner { transform: rotateY(180deg); }
    .face {
      position: absolute; inset: 0; backface-visibility: hidden;
      border-radius: 18px; border: 1px solid var(--line);
      padding: 20px; display: flex; flex-direction: column;
    }
    .front { background: var(--card); }
    .thumb {
      height: 130px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 56px; margin-bottom: 14px;
    }
    .rank { position: absolute; top: 14px; left: 14px; background: rgba(0,0,0,.4); border-radius: 999px; padding: 2px 10px; font-size: 12px; font-weight: 700; }
    .name { font-weight: 800; font-size: 17px; }
    .reason { color: var(--muted); font-size: 13px; margin-top: 6px; flex: 1; }
    .price { font-weight: 700; color: var(--accent); margin-top: 8px; }
    .flip-hint { color: var(--muted); font-size: 11px; margin-top: 10px; }

    .back { background: linear-gradient(160deg, #20233f, #191b30); transform: rotateY(180deg); }
    .back h3 { font-size: 16px; margin-bottom: 8px; }
    .back .detail { color: var(--muted); font-size: 13px; flex: 1; }
    .back .signals { margin-top: 10px; font-size: 12px; }
    .back .signals span { display: inline-block; background: #2a2e52; border-radius: 999px; padding: 2px 9px; margin: 3px 3px 0 0; }
    .link {
      display: block; text-align: center; margin-top: 12px; padding: 11px;
      border-radius: 12px; text-decoration: none; font-weight: 700; color: #fff;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
    }
    .links { display: flex; gap: 8px; margin-top: 12px; }
    .links .link { flex: 1; margin-top: 0; padding: 10px; font-size: 13px; }
    .link.alt { background: #2a2e52; }

    .forbidden { margin-top: 26px; border: 1px solid rgba(255,85,102,.5); background: linear-gradient(160deg, rgba(255,85,102,.10), rgba(255,85,102,.03)); border-radius: 16px; padding: 20px 22px; }
    .forbidden .tag { font-size: 12px; color: var(--danger); font-weight: 700; letter-spacing: .04em; }
    .forbidden .fname { font-weight: 800; font-size: 17px; margin-top: 6px; }
    .forbidden .freason { color: var(--muted); font-size: 14px; margin-top: 4px; }

    .empty { text-align: center; color: var(--muted); padding: 30px; }
    .restart { display: block; margin: 26px auto 0; background: none; border: 1px solid var(--line); color: var(--muted); padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 40px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo"><span class="gift">🎁</span><span class="grad">PresentToU</span></div>
      <p>취향을 잘 모르는 상대에게 줄 선물, 대화 데이터로 1분 안에 TOP 3 추천</p>
    </header>

    <!-- 입력 패널 -->
    <section class="panel" id="inputPanel">
      <h2>선물 추천 정보 입력</h2>
      <p class="hint">선물 받는 사람의 정보와 대화 데이터를 입력해주세요. txt, wav, zip 파일을 지원합니다. (실제 AI가 관계·취향을 분석해 추천합니다)</p>
      <div class="uploads">
        <label class="drop">
          <div class="ico">👤</div>
          <div class="label">선물 받는 사람</div>
          <div class="sub"><input type="text" id="recipientName" placeholder="이름 입력" /></div>
        </label>
        <label class="drop">
          <div class="ico">💰</div>
          <div class="label">선물 예산</div>
          <div class="sub budget-range">
            <div class="budget-track" aria-label="예산 범위">
              <input type="range" id="budgetMin" min="1000" max="300000" step="1000" value="50000" aria-label="최소 예산" />
              <input type="range" id="budgetMax" min="1000" max="300000" step="1000" value="100000" aria-label="최대 예산" />
            </div>
          </div>
          <div class="sub" id="budgetValue">50,000원 ~ 100,000원</div>
        </label>
        <label class="drop" id="dropData">
          <div class="ico">💬</div>
          <div class="label">대화 텍스트 업로드</div>
          <div class="sub">.txt / .csv · 여러 개</div>
          <input type="file" id="dataFile" accept=".txt,.csv,text/plain" multiple />
        </label>
        <label class="drop" id="dropVoice">
          <div class="ico">🎙️</div>
          <div class="label">음성 인식 (통화 녹음)</div>
          <div class="sub">.wav / .mp3 / .m4a · 자동 전사 · 여러 개</div>
          <input type="file" id="voiceFile" accept=".wav,.mp3,.m4a,.ogg,.webm,audio/*" multiple />
        </label>
      </div>
      <button class="cta" id="recommendBtn" disabled>TOP 3 선물 추천받기</button>
      <p class="status" id="status"></p>
    </section>

    <!-- 결과 패널 -->
    <section class="results" id="results">
      <h2>이 사람에게 무난한 선물 TOP 3</h2>
      <p class="sub"><span class="timer" id="elapsed"></span> · 카드에 커서를 올리면 상세와 구매 링크가 보여요</p>
      <p class="ingest" id="ingest"></p>
      <div class="analysis" id="analysis"></div>
      <div class="cards" id="cards"></div>
      <div class="forbidden" id="forbidden"></div>
      <button class="restart" id="restartBtn">다시 추천받기</button>
    </section>

    <footer>데모 프로토타입 · 업로드 데이터는 저장하지 않습니다 · 회원가입/결제 없음</footer>
  </div>

  <script>
    const dataFile = document.getElementById('dataFile');
    const recipientName = document.getElementById('recipientName');
    const budgetMin = document.getElementById('budgetMin');
    const budgetMax = document.getElementById('budgetMax');
    const budgetValue = document.getElementById('budgetValue');
    const dropData = document.getElementById('dropData');
    const voiceFile = document.getElementById('voiceFile');
    const dropVoice = document.getElementById('dropVoice');
    const btn = document.getElementById('recommendBtn');
    const statusEl = document.getElementById('status');
    const results = document.getElementById('results');
    const inputPanel = document.getElementById('inputPanel');
    const cardsEl = document.getElementById('cards');
    const analysisEl = document.getElementById('analysis');
    const forbiddenEl = document.getElementById('forbidden');
    const elapsedEl = document.getElementById('elapsed');
    const ingestEl = document.getElementById('ingest');

    const THUMB_BG = [
      'linear-gradient(135deg,#ff9a9e,#fad0c4)',
      'linear-gradient(135deg,#a18cd1,#fbc2eb)',
      'linear-gradient(135deg,#84fab0,#8fd3f4)'
    ];

    function refresh() {
      btn.disabled = !recipientName.value.trim() || (!dataFile.files.length && !voiceFile.files.length);
    }
    // 파일 선택 시 드롭 영역에 파일명/개수 표시
    function bindDrop(input, drop, placeholder) {
      input.addEventListener('change', () => {
        if (input.files.length) {
          drop.classList.add('filled');
          const names = Array.from(input.files).map((f) => f.name);
          drop.querySelector('.sub').textContent =
            names.length === 1 ? names[0] : `${names.length}개 파일: ${names.join(', ')}`;
        } else {
          drop.classList.remove('filled');
          drop.querySelector('.sub').textContent = placeholder;
        }
        refresh();
      });
    }
    bindDrop(dataFile, dropData, '.txt / .csv · 여러 개');
    bindDrop(voiceFile, dropVoice, '.wav / .mp3 / .m4a · 자동 전사 · 여러 개');
    recipientName.addEventListener('input', refresh);
    [budgetMin, budgetMax].forEach(input => input.addEventListener('input', () => {
      if (Number(budgetMin.value) > Number(budgetMax.value)) {
        if (input === budgetMin) budgetMax.value = budgetMin.value;
        else budgetMin.value = budgetMax.value;
      }
      budgetValue.textContent = `${Number(budgetMin.value).toLocaleString()}원 ~ ${Number(budgetMax.value).toLocaleString()}원`;
      refresh();
    }));

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // 오디오로 인식할 확장자 (OpenAI whisper 지원 포맷)
    const AUDIO_EXT = ['.wav', '.mp3', '.m4a', '.ogg', '.webm', '.mpga', '.mp4', '.mpeg'];
    const MAX_AUDIO_BYTES = 4 * 1024 * 1024; // Vercel 서버리스 요청 본문 한도(~4.5MB) 보호
    // Groq 전사 모델. 더 빠른 'whisper-large-v3-turbo'로 바꿔도 됩니다.
    const TRANSCRIBE_MODEL = 'whisper-large-v3';

    // 음성 파일을 서버(/api/transcribe)로 보내 전사 텍스트를 받는다 (키는 서버에만 존재)
    async function transcribe(file) {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('model', TRANSCRIBE_MODEL);
      const res = await fetch('/api/transcribe', { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      return data.text || '';
    }

    // 여러 파일 지원: 텍스트는 원문, 음성은 전사해서 파일명 헤더와 함께 이어붙인다
    async function readConversations(files) {
      const parts = [];
      const skipped = [];
      let voiceOk = 0;
      const list = Array.from(files);
      for (let i = 0; i < list.length; i++) {
        const file = list[i];
        const name = (file.name || '').toLowerCase();
        const isText = name.endsWith('.txt') || name.endsWith('.csv') || (file.type || '').startsWith('text');
        const isAudio = AUDIO_EXT.some((e) => name.endsWith(e)) || (file.type || '').startsWith('audio');
        if (isText) {
          const content = await file.text();
          parts.push(`===== ${file.name} =====\n${content}`);
        } else if (isAudio) {
          if (file.size > MAX_AUDIO_BYTES) {
            skipped.push(`${file.name} (음성 파일이 4MB를 초과)`);
            continue;
          }
          statusEl.innerHTML = `음성 파일 전사 중 (${i + 1}/${list.length}: ${esc(file.name)})… <span class="timer">⏱</span>`;
          try {
            const text = await transcribe(file);
            parts.push(`===== ${file.name} (음성 전사) =====\n${text}`);
            voiceOk++;
          } catch (e) {
            skipped.push(`${file.name} (전사 실패: ${e.message})`);
          }
        } else {
          skipped.push(file.name);
        }
      }
      const notes = [];
      if (voiceOk) notes.push(`음성 ${voiceOk}건을 전사해 함께 분석했습니다.`);
      if (skipped.length) notes.push(`제외/실패: ${skipped.join(', ')}`);
      return { text: parts.join('\n\n'), note: notes.join(' ') };
    }

    function render(data) {
      analysisEl.innerHTML = `<div class="tag">관계 · 취향 분석</div><p>${esc(data.analysis)}</p>`;

      const top3 = Array.isArray(data.top3) ? data.top3.slice(0, 3) : [];
      cardsEl.innerHTML = top3.map((g, i) => {
        const q = encodeURIComponent(g.query || g.name || '');
        const naver = 'https://search.shopping.naver.com/search/all?query=' + q;
        const coupang = 'https://www.coupang.com/np/search?q=' + q;
        // 2차 단계에서 받은 실제 구매 URL이 있으면 그 링크로, 없으면 검색으로 폴백
        const buy = (typeof g.url === 'string' && /^https?:\/\//.test(g.url)) ? g.url : '';
        const store = g.store ? esc(g.store) : '구매처';
        const buyLinks = buy
          ? [{ href: buy, label: `${store}에서 구매 →`, cls: 'link' }, { href: naver, label: '검색으로 확인', cls: 'link alt' }]
          : [{ href: naver, label: '네이버쇼핑에서 구매 →', cls: 'link' }, { href: coupang, label: '쿠팡', cls: 'link alt' }];
        const signals = Array.isArray(g.signals) ? g.signals : [];
        return `
        <div class="card" tabindex="0">
          <div class="card-inner">
            <div class="face front">
              <div class="rank">TOP ${i + 1}</div>
              <div class="thumb" style="background:${THUMB_BG[i % THUMB_BG.length]}">${esc(g.emoji || '🎁')}</div>
              <div class="name">${esc(g.name)}</div>
              <div class="reason">${esc(g.reason)}</div>
              <div class="price">예상 ${esc(g.price)}</div>
              <div class="flip-hint">↺ 커서를 올리면 상세 보기</div>
            </div>
            <div class="face back">
              <h3>${esc(g.name)}</h3>
              <div class="detail">${esc(g.detail)}</div>
              <div class="signals">${signals.map((s) => `<span># ${esc(s)}</span>`).join('')}</div>
              <div class="links">
                ${buyLinks.map((l) => `<a class="${l.cls}" href="${esc(l.href)}" target="_blank" rel="noopener">${l.label}</a>`).join('')}
              </div>
            </div>
          </div>
        </div>`;
      }).join('');

      const f = data.forbidden || {};
      forbiddenEl.innerHTML =
        `<div class="tag">🚫 절대 금지 선물</div>
         <div class="fname">${esc(f.name)}</div>
         <div class="freason">${esc(f.reason)}</div>`;
    }

    btn.addEventListener('click', async () => {
      if (!recipientName.value.trim() || (!dataFile.files.length && !voiceFile.files.length)) return;
      statusEl.className = 'status';
      statusEl.innerHTML = '파일을 처리하는 중… <span class="timer">⏱</span>';
      btn.disabled = true;
      const start = performance.now();
      try {
        const { text, note } = await readConversations([...dataFile.files, ...voiceFile.files]);
        statusEl.innerHTML = '대화 내용을 AI가 분석하는 중… <span class="timer">⏱</span>';
        const res = await fetch('/api/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            recipientName: recipientName.value.trim(),
            budgetMin: Number(budgetMin.value),
            budgetMax: Number(budgetMax.value),
            conversation: text,
            note,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));

        const sec = ((performance.now() - start) / 1000).toFixed(1);
        elapsedEl.textContent = `${sec}초 만에 분석 완료`;
        ingestEl.textContent = note || '';
        render(data);
        inputPanel.style.display = 'none';
        results.classList.add('show');
        results.scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        statusEl.className = 'status err';
        statusEl.textContent = '오류: ' + err.message;
        btn.disabled = false;
      }
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      results.classList.remove('show');
      inputPanel.style.display = '';
      statusEl.textContent = '';
      statusEl.className = 'status';
      inputPanel.scrollIntoView({ behavior: 'smooth' });
    });
  </script>
</body>
</html>
